[workspace]
name = "dvlt"
version = "0.0.1"
description = "Pixi environment for DVLT with the VGGT-Omega evaluation backend"
channels = ["conda-forge", "pytorch", "nvidia"]
platforms = [{ platform = "linux-64", cuda = "12.4" }]

[dependencies]
python = "3.11.*"
pip = ">=25,<27"
pytorch = { version = "2.5.1.*", channel = "pytorch" }
torchvision = { version = "0.20.1.*", channel = "pytorch" }
pytorch-cuda = { version = "12.4.*", channel = "pytorch" }
pillow = "11.2.1.*"
numpy = "2.4.4.*"
open3d = "0.19.0.*"
plotly = "6.2.0.*"
matplotlib = "3.10.3.*"
pydantic = "2.12.4.*"

[pypi-dependencies]
accelerate = "==1.8.1"
h5py = "==3.16.0"
huggingface-hub = "==1.16.4"
hydra-core = "==1.3.2"
omegaconf = "==2.3.0"
opencv-python = "==4.11.0.86"
safetensors = "==0.5.3"
scipy = "==1.16.0"
tqdm = "==4.67.1"
rich = "==14.3.3"
tensorboard = "==2.19.0"
wandb = "==0.25.1"
rerun-sdk = "==0.24.1"
einops = "==0.8.1"
jaxtyping = "==0.3.7"
pytest = "==8.4.1"

[tasks]
install-dvlt = "python -m pip install --no-deps -e ."
install-vggt-omega = "python -m pip install --no-deps git+https://github.com/facebookresearch/vggt-omega.git@39a0cb8af88554f15ddcb5354cd52bde588fa014"
setup = { cmd = "python -c \"import dvlt, vggt_omega; print('DVLT + VGGT-Omega installed')\"", depends-on = ["install-dvlt", "install-vggt-omega"] }
smoke-import = { cmd = "python -c \"import torch; from dvlt.model.vggt_omega.model import VGGTOmega; from vggt_omega.models import VGGTOmega as Backend; print({'torch': torch.__version__, 'cuda_runtime': torch.version.cuda, 'cuda_available': torch.cuda.is_available(), 'gpu': torch.cuda.get_device_name(0) if torch.cuda.is_available() else None, 'wrapper': VGGTOmega.__name__, 'backend': Backend.__name__})\"", depends-on = ["setup"] }
smoke-vggt-omega = { cmd = "python scripts/smoke_vggt_omega.py", depends-on = ["setup"] }
smoke = { cmd = "python -c \"print('DVLT VGGT-Omega smoke tests passed')\"", depends-on = ["smoke-import", "smoke-vggt-omega"] }
